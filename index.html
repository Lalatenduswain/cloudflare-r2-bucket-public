<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══════════════════════════════════════════
         PRIMARY SEO  — update to match your domain
    ═══════════════════════════════════════════ -->
    <title>R2 File Vault — Secure Cloud File Storage</title>
    <meta name="description" content="R2 File Vault is a fast, secure, zero-cost file storage and sharing platform powered by Cloudflare R2. Upload, manage, and share files instantly from the edge." />
    <meta name="keywords" content="file storage, cloud storage, file upload, file sharing, Cloudflare R2, secure storage, file vault, edge storage" />
    <meta name="author" content="Your Name" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://your-domain.com/" />

    <!-- ═══════════════════════════════════════════
         OPEN GRAPH  (Facebook, LinkedIn, WhatsApp)
    ═══════════════════════════════════════════ -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://your-domain.com/" />
    <meta property="og:site_name"   content="R2 File Vault" />
    <meta property="og:title"       content="R2 File Vault — Secure Cloud File Storage" />
    <meta property="og:description" content="Fast, secure, zero-cost file storage powered by Cloudflare R2. Upload and share files instantly from the global edge network." />
    <meta property="og:image"       content="https://your-domain.com/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="R2 File Vault — Cloudflare-powered file storage" />
    <meta property="og:locale"      content="en_US" />

    <!-- ═══════════════════════════════════════════
         TWITTER CARD
    ═══════════════════════════════════════════ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@yourhandle" />
    <meta name="twitter:creator"     content="@yourhandle" />
    <meta name="twitter:url"         content="https://your-domain.com/" />
    <meta name="twitter:title"       content="R2 File Vault — Secure Cloud File Storage" />
    <meta name="twitter:description" content="Fast, secure, zero-cost file storage powered by Cloudflare R2. Upload and share files instantly from the global edge." />
    <meta name="twitter:image"       content="https://your-domain.com/og-image.png" />

    <!-- ═══════════════════════════════════════════
         THEME / PWA
    ═══════════════════════════════════════════ -->
    <meta name="theme-color" content="#00d4ff" />
    <meta name="color-scheme" content="dark" />
    <meta name="application-name" content="R2 File Vault" />

    <!-- ═══════════════════════════════════════════
         STRUCTURED DATA  (JSON-LD)
    ═══════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "R2 File Vault",
      "url": "https://your-domain.com/",
      "description": "Fast, secure, zero-cost file storage and sharing platform powered by Cloudflare R2 edge network.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Person",
        "name": "Your Name",
        "url": "https://your-domain.com"
      },
      "provider": {
        "@type": "Organization",
        "name": "Cloudflare",
        "url": "https://cloudflare.com"
      }
    }
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
